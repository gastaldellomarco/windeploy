name: CI Pipeline

on:
  push:
    branches: [ develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'agent/**'
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # BACKEND — Laravel 11 / PHP 8.3
  # ──────────────────────────────────────────
  backend-ci:
    name: Backend CI (Laravel 11)
    runs-on: ubuntu-latest
    if: contains(toJSON(github.event.commits.*.modified), 'backend/') || github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: windeploy_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql, xml, curl, zip
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env.testing
        working-directory: backend
        run: cp .env.example .env.testing

      - name: Set env variables for testing
        working-directory: backend
        run: |
          php artisan key:generate --env=testing
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=windeploy_test/' .env.testing
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env.testing
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env.testing
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --env=testing --force

      - name: Run tests
        working-directory: backend
        run: php artisan test --env=testing

  # ──────────────────────────────────────────
  # FRONTEND — React 18 + Vite
  # ──────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (React 18 + Vite)
    runs-on: ubuntu-latest
    if: contains(toJSON(github.event.commits.*.modified), 'frontend/') || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.windeploy.mavcoo.it

  # ──────────────────────────────────────────
  # AGENT — Python 3.11
  # ──────────────────────────────────────────
  agent-ci:
    name: Agent CI (Python 3.11)
    runs-on: windows-latest
    if: contains(toJSON(github.event.commits.*.modified), 'agent/') || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: agent
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: agent
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true
